<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container text-center mt-4">
  <h5 class="mb-3">Sección 1: Tonos Fríos</h5>
  <div class="row align-items-start">
    <div class="col bg-secondary text-white p-3 border">
      Columna 1
    </div>
    <div class="col bg-light text-dark p-3 border">
      Columna 2
    </div>
    <div class="col bg-dark text-white p-3 border">
      Columna 3
    </div>
    <div class="col bg-info-subtle text-info-emphasis p-3 border">
      Columna 4
    </div>
  </div>
</div>

<div class="container text-center mt-5">
  <h5 class="mb-3">Sección 2: Contraste Alto</h5>
  <div class="row align-items-center mb-3">
    <div class="col bg-danger text-white p-4">
      Fila 1 - Columna 1
    </div>
    <div class="col bg-warning-subtle text-warning-emphasis p-4">
      Fila 1 - Columna 2
    </div>
  </div>

  <div class="row align-items-center">
    <div class="col bg-black text-white p-4">
      Fila 2 - Columna 1
    </div>
    <div class="col bg-primary-subtle text-primary-emphasis p-4">
      Fila 2 - Columna 2
    </div>
  </div>
</div>

<div class="container text-center mt-5 mb-5">
  <h5 class="mb-3">Sección 3: Paleta Naturaleza</h5>
  <div class="row mb-3">
    <div class="col bg-success text-white p-3">Fila 1 - Col 1</div>
    <div class="col bg-success-subtle text-success-emphasis p-3">Fila 1 - Col 2</div>
  </div>

  <div class="row mb-3">
    <div class="col bg-tertiary text-dark p-3 border">Fila 2 - Col 1</div>
    <div class="col bg-body-secondary text-dark p-3 border">Fila 2 - Col 2</div>
    <div class="col bg-body-tertiary text-dark p-3 border">Fila 2 - Col 3</div>
  </div>

  <div class="row">
    <div class="col bg-opacity-75 bg-info text-white p-3">Fila 3 - Col 1</div>
    <div class="col bg-opacity-50 bg-info text-dark p-3">Fila 3 - Col 2</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
